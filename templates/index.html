<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu</title>
    <style>
        /* Basit ve temiz CSS stilleri */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Başlık stili */
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        /* Arama kutusu */
        .arama-kutusu {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .arama-kutusu form {
            display: flex;
            gap: 10px;
        }
        
        .arama-kutusu input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }
        
        .arama-kutusu input[type="text"]:focus {
            border-color: #667eea;
        }
        
        .arama-kutusu button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .arama-kutusu button:hover {
            background: #5a6fd6;
        }
        
        /* Popüler şehirler */
        .populer-sehirler {
            margin-top: 20px;
            text-align: center;
        }
        
        .populer-sehirler p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .populer-sehirler a {
            display: inline-block;
            padding: 8px 15px;
            margin: 5px;
            background: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .populer-sehirler a:hover {
            background: #667eea;
            color: white;
        }
        
        /* Footer */
        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }
        
        footer a {
            color: white;
        }
        
        /* Yükleme animasyonu */
        .yukleme-ekrani {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.95) 100%);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        
        .yukleme-kutusu {
            text-align: center;
            animation: yukariGel 0.5s ease-out;
        }
        
        @keyframes yukariGel {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Hava durumu ikonu animasyonu */
        .hava-ikon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: sallan 2s ease-in-out infinite;
        }
        
        @keyframes sallan {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
        }
        
        /* Dönen halka animasyonu */
        .spinner-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
        }
        
        .spinner-halka {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
        }
        
        .spinner-halka:nth-child(1) {
            border-top-color: #fff;
            animation: donme 1.5s linear infinite;
        }
        
        .spinner-halka:nth-child(2) {
            border-right-color: rgba(255,255,255,0.6);
            animation: donme 2s linear infinite reverse;
        }
        
        .spinner-halka:nth-child(3) {
            border-bottom-color: rgba(255,255,255,0.3);
            animation: donme 2.5s linear infinite;
        }
        
        .spinner-merkez {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            animation: nabiz 1.5s ease-in-out infinite;
        }
        
        @keyframes donme {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes nabiz {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }
        
        .yukleme-yazi {
            color: white;
            font-size: 1.4em;
            font-weight: 500;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .yukleme-alt-yazi {
            color: rgba(255,255,255,0.8);
            font-size: 1em;
        }
        
        /* Nokta animasyonu */
        .noktalar span {
            animation: noktaAnimasyon 1.4s infinite;
            animation-fill-mode: both;
        }
        
        .noktalar span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .noktalar span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes noktaAnimasyon {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Yükleme Ekranı -->
    <div class="yukleme-ekrani" id="yuklemeEkrani">
        <div class="yukleme-kutusu">
            <div class="spinner-container">
                <div class="spinner-halka"></div>
                <div class="spinner-halka"></div>
                <div class="spinner-halka"></div>
                <div class="spinner-merkez">🌤️</div>
            </div>
            <p class="yukleme-yazi">Hava Durumu Alınıyor</p>
            <p class="yukleme-alt-yazi">Lütfen bekleyin<span class="noktalar"><span>.</span><span>.</span><span>.</span></span></p>
        </div>
    </div>
    
    <div class="container">
        <!-- Başlık -->
        <header>
            <h1>🌤️ Hava Durumu</h1>
            <p>Dünyanın her yerinden anlık hava durumu bilgisi</p>
        </header>
        
        <!-- Arama Kutusu -->
        <div class="arama-kutusu">
            <form action="/hava" method="GET" onsubmit="yuklemeGoster()">
                <input 
                    type="text" 
                    name="sehir" 
                    placeholder="Şehir adı girin (örn: İstanbul, Ankara, İzmir)"
                    required
                >
                <button type="submit">🔍 Ara</button>
            </form>
            
            <!-- Popüler Şehirler -->
            <div class="populer-sehirler">
                <p>Popüler şehirler:</p>
                <a href="/hava?sehir=Istanbul">İstanbul</a>
                <a href="/hava?sehir=Ankara">Ankara</a>
                <a href="/hava?sehir=Izmir">İzmir</a>
                <a href="/hava?sehir=Antalya">Antalya</a>
                <a href="/hava?sehir=London">Londra</a>
                <a href="/hava?sehir=Paris">Paris</a>
                <a href="/hava?sehir=New+York">New York</a>
                <a href="/hava?sehir=Tokyo">Tokyo</a>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>wttr.in API kullanılarak geliştirilmiştir</p>
        </footer>
    </div>
    
    <script>
        // Yükleme ekranını göster
        function yuklemeGoster() {
            document.getElementById('yuklemeEkrani').style.display = 'flex';
        }
        
        // Popüler şehir linklerine tıklandığında da yükleme göster
        document.querySelectorAll('.populer-sehirler a').forEach(function(link) {
            link.addEventListener('click', function() {
                yuklemeGoster();
            });
        });
    </script>
</body>
</html>
