<form class="search-form" action="{{ url_for('weather.weather') }}" method="get" data-weather-form>
    <label class="visually-hidden" for="{{ input_id }}">Şehir adı</label>
    <input
        id="{{ input_id }}"
        type="text"
        name="sehir"
        placeholder="{{ placeholder }}"
        value="{{ city | default('', true) }}"
        maxlength="100"
        autocomplete="address-level2"
        required
    >
    <button type="submit">🔍 Ara</button>
</form>
