<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hava Durumu{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</head>
<body>
    <div class="loading-overlay" data-loading-overlay aria-hidden="true">
        <div class="loading-box" role="status">
            <div class="spinner" aria-hidden="true">
                <span></span><span></span><span></span>
                <b>🌤️</b>
            </div>
            <p class="loading-title">Hava durumu alınıyor</p>
            <p>Lütfen bekleyin<span class="loading-dots">...</span></p>
        </div>
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Veriler wttr.in servisi üzerinden sağlanır.</p>
    </footer>
</body>
</html>
